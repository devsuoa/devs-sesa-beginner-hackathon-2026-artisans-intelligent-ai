<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devs-sesa-beginner-hackathon-2026</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <div id="game-container">
    <div id="status-bar" class="hidden">
      <p>飞船护盾: <span id="shield-display">❤️❤️❤️</span></p>
    </div>

    <section id="screen-prologue" class="screen">
      <h2>📡 远程通讯频道</h2>

      <div id="dialogue-history"></div>

      <button id="start-btn" class="hidden" style="margin-top: 20px;" onclick="startGame()">🚀 启动飞船引擎</button>
    </section>

    <section id="screen-map" class="screen hidden">
      <h2>星系地图：选择你要前往的星球</h2>
      <div id="ship" class="pixel-ship">🚀</div>
    </section>

    <section id="screen-quiz" class="screen hidden">
      <div class="quiz-header">
        <h2 id="planet-name">星球名字</h2>
        <div class="planet-avatar">
          <img id="planet-big-img" src="" alt="星球展示">
        </div>
      </div>

      <p id="planet-desc" class="planet-description"></p>
      <p id="question-text" class="question-text">题目加载中...</p>

      <div id="options-container" class="options-container"></div>
    </section>
    <section id="screen-earth-status" class="screen hidden">
      <h2>🌍 地球当前状态</h2>

      <div class="earth-status-container">
        <div class="earth-visual">
          <img src="assets/earth-level1.png" id="earth-large-img" alt="地球状态">
        </div>

        <div class="dialogue-box">
          <p id="earth-description">地球目前处于能量极度匮乏状态，生态系统静止...</p>
          <p>当前修复总进度：<span id="earth-progress-val">0%</span></p>
        </div>

        <button class="menu-btn" onclick="showScreen('screen-map')">🛰️ 返回星际地图</button>
      </div>
    </section>

    <section id="screen-win" class="screen hidden">
      <h2>✨ 任务完成 ✨</h2>
      <div class="dialogue-box">
        <p>“能量满载！正在将外星智慧注入地球核心...”</p>
        <p>（地球重新焕发了蓝色生机！）</p>
        <p>“感谢你，舰长。你不仅拯救了地球，还成为了最伟大的天文航行者！”</p>
      </div>
      <button onclick="location.reload()">再玩一次</button>
    </section>

    <section id="screen-lose" class="screen hidden">
      <h2 style="color: red;">💥 护盾耗尽 💥</h2>
      <div class="dialogue-box">
        <p>“警报！飞船外壳破裂，失去动力...”</p>
        <p>“通讯中断... 地球的最后希望破灭了...”</p>
      </div>
      <button onclick="location.reload()">重新尝试</button>
    </section>
    <section id="screen-lose" class="screen hidden">
    </section>

    <div id="modal-progress" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">星球攻略完毕！</h3>
        <p>地球修复进度：<span id="progress-text">0%</span></p>
        <button onclick="returnToMap()">返回星际图</button>
      </div>
    </div>
  </div>

  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>

</html>
